<!DOCTYPE html>
<html>
<head>
    <title>College Management System</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #0f172a;
            color: white;
        }
        header {
            background: #1e293b;
            padding: 20px;
            text-align: center;
        }
        nav {
            text-align: center;
            background: #020617;
            padding: 10px;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        section {
            padding: 20px;
        }
        .card {
            background: #1e293b;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>College Management System 🎓</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Students</a>
    <a href="#">Teachers</a>
    <a href="#">Contact</a>
</nav>

<section>
    <h2>Welcome</h2>
    <div class="card">
        <p>This system helps manage college data easily.</p>
    </div>
</section>

<section>
    <h2>Students</h2>
    <div class="card">
        <p>Student 1</p>
        <p>Student 2</p>
    </div>
</section>

<section>
    <h2>Teachers</h2>
    <div class="card">
        <p>Teacher 1</p>
        <p>Teacher 2</p>
    </div>
</section>

</body>
</html>
